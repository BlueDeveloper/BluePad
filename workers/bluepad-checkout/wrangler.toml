name = "bluepad-checkout"
main = "worker.js"
compatibility_date = "2026-05-03"

# 루트 도메인 경로로 운영 (bluepad.work는 이미 Paddle Approved)
# 서브도메인 별도 승인 대기 우회 + URL 일관성
routes = [
  { pattern = "bluepad.work/buy", zone_name = "bluepad.work" },
  { pattern = "bluepad.work/buy/*", zone_name = "bluepad.work" },
  { pattern = "bluepad.work/sandbox/buy", zone_name = "bluepad.work" },
  { pattern = "bluepad.work/sandbox/buy/*", zone_name = "bluepad.work" }
]

# 옛 MSI(1.8.0 이하) 사용자가 *.workers.dev URL을 호출 → 임시로 살려두고 worker.js에서 redirect
# 1.9.0+ 사용자가 충분히 마이그레이션되면 다시 false로 전환
workers_dev = true
preview_urls = false

[vars]
PRODUCT_PRICE = "10.99"
PRODUCT_NAME = "BluePad Pro License"
LICENSE_API = "https://bluepad-license-api.blueehdwp.workers.dev"
# Paddle 대시보드에서 발급 후 채워넣기:
PADDLE_CLIENT_TOKEN = "live_8383d7797ae892172350aa1a750"   # Paddle Client-side token (public, OK to expose)
PADDLE_PRICE_ID = "pri_01kr6jpy938bgxqwj46xn7gs0d"  # BluePad Pro Lifetime License

[[d1_databases]]
binding = "DB"
database_name = "bluepad-licenses"
database_id = "6e9776a9-f68a-45b9-b3f7-00cbd6bda70c"

# Secrets (wrangler secret put 으로 설정):
# PADDLE_API_KEY                  — Paddle Live > Developer Tools > Authentication > API key
# PADDLE_WEBHOOK_SECRET           — Paddle Live > Notifications > Webhook 등록 후 발급
# LICENSE_ADMIN_SECRET            — 기존 유지
# PADDLE_SANDBOX_API_KEY          — Paddle Sandbox > Developer Tools > API key (sandbox 계정 가입 후)
# PADDLE_SANDBOX_WEBHOOK_SECRET   — Paddle Sandbox > Notifications > Webhook URL: bluepad.work/sandbox/buy/paddle-webhook

# Sandbox 환경 변수 (Paddle Sandbox 대시보드에서 발급):
# PADDLE_SANDBOX_CLIENT_TOKEN     — Sandbox client-side token
# PADDLE_SANDBOX_PRICE_ID         — Sandbox에서 동일 상품 등록 후 price_id
