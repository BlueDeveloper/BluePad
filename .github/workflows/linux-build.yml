name: Linux Build

# Tauri v2 Linux 빌드 (.deb / .rpm / .AppImage)
# - 수동 트리거 권장 (workflow_dispatch)
# - 매 push 자동 빌드는 부하/시간 부담 → 수동만
# - 산출물은 Actions Artifact로 보관 (30일), release=true 시 GitHub Release 생성

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: 'GitHub Release 초안 생성 (true=초안, false=Artifact만)'
        type: boolean
        default: false

jobs:
  linux-build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri (Linux)
        run: npm run tauri build -- --bundles deb,rpm,appimage

      - name: List build artifacts
        run: |
          echo "=== Build artifacts ==="
          ls -la src-tauri/target/release/bundle/deb/ 2>/dev/null || echo "(no deb)"
          ls -la src-tauri/target/release/bundle/rpm/ 2>/dev/null || echo "(no rpm)"
          ls -la src-tauri/target/release/bundle/appimage/ 2>/dev/null || echo "(no appimage)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bluepad-linux-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 30

      - name: Read package.json version
        if: ${{ inputs.create_release }}
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (draft)
        if: ${{ inputs.create_release }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: linux-v${{ steps.pkg.outputs.version }}-${{ github.run_number }}
          name: BluePad Linux ${{ steps.pkg.outputs.version }} (build ${{ github.run_number }})
          body: |
            BluePad ${{ steps.pkg.outputs.version }} Linux 빌드.
            - .deb: Ubuntu/Debian 계열
            - .rpm: Fedora/RHEL 계열
            - .AppImage: 모든 Linux 배포판 (실행 권한 부여 후 실행)

            설치:
            - Ubuntu/Debian: `sudo dpkg -i bluepad_*.deb`
            - Fedora: `sudo rpm -i bluepad-*.rpm`
            - AppImage: `chmod +x bluepad_*.AppImage && ./bluepad_*.AppImage`
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          draft: true
          prerelease: false
