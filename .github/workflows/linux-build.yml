name: Linux Build

# Tauri v2 Linux 빌드 (.deb / .rpm / .AppImage)
# - 수동 트리거 권장 (workflow_dispatch)
# - 매 push 자동 빌드는 부하/시간 부담 → 수동만
# - 산출물은 Actions Artifact로 보관 (30일), release=true 시 GitHub Release 생성

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'GitHub Release 초안 생성 (true=초안, false=Artifact만)'
        type: boolean
        default: false
      upload_r2:
        description: 'Cloudflare R2 업로드 (true=업로드, false=Artifact만)'
        type: boolean
        default: false

jobs:
  linux-build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libxdo-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-rust-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri (Linux)
        # Linux는 자동 업데이트 미사용 (.deb/.rpm/.AppImage는 패키지 매니저 또는 사용자 수동 업데이트)
        # → createUpdaterArtifacts=false로 서명 키 요구 회피
        run: npm run tauri build -- --bundles deb,rpm,appimage --config '{"bundle":{"createUpdaterArtifacts":false}}'

      - name: List build artifacts
        run: |
          echo "=== Build artifacts ==="
          ls -la src-tauri/target/release/bundle/deb/ 2>/dev/null || echo "(no deb)"
          ls -la src-tauri/target/release/bundle/rpm/ 2>/dev/null || echo "(no rpm)"
          ls -la src-tauri/target/release/bundle/appimage/ 2>/dev/null || echo "(no appimage)"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bluepad-linux-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: error
          retention-days: 30

      - name: Read package.json version
        id: pkg
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER=$(node -p "require('./package.json').version")
          fi
          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VER}"

      - name: Upload to Cloudflare R2
        # tag push 또는 workflow_dispatch + upload_r2=true 일 때 실행
        if: startsWith(github.ref, 'refs/tags/v') || inputs.upload_r2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          VER=${{ steps.pkg.outputs.version }}
          BASE=src-tauri/target/release/bundle
          npm install -g wrangler
          APPIMAGE=$(find "$BASE/appimage" -maxdepth 1 -name '*.AppImage' | head -1)
          DEB=$(find "$BASE/deb" -maxdepth 1 -name '*.deb' | head -1)
          RPM=$(find "$BASE/rpm" -maxdepth 1 -name '*.rpm' | head -1)
          if [ -n "$APPIMAGE" ]; then
            wrangler r2 object put "bluepad-downloads/BluePad_${VER}_amd64.AppImage" \
              --file="$APPIMAGE" --content-type="application/octet-stream" --remote
          fi
          if [ -n "$DEB" ]; then
            wrangler r2 object put "bluepad-downloads/BluePad_${VER}_amd64.deb" \
              --file="$DEB" --content-type="application/vnd.debian.binary-package" --remote
          fi
          if [ -n "$RPM" ]; then
            wrangler r2 object put "bluepad-downloads/BluePad-${VER}-1.x86_64.rpm" \
              --file="$RPM" --content-type="application/x-rpm" --remote
          fi

      - name: Attach to existing GitHub Release (tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Create GitHub Release (draft, manual)
        if: ${{ inputs.create_release && !startsWith(github.ref, 'refs/tags/v') }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: linux-v${{ steps.pkg.outputs.version }}-${{ github.run_number }}
          name: BluePad Linux ${{ steps.pkg.outputs.version }} (build ${{ github.run_number }})
          body: |
            BluePad ${{ steps.pkg.outputs.version }} Linux 빌드.
            - .deb: Ubuntu/Debian 계열
            - .rpm: Fedora/RHEL 계열
            - .AppImage: 모든 Linux 배포판 (실행 권한 부여 후 실행)

            설치:
            - Ubuntu/Debian: `sudo dpkg -i bluepad_*.deb`
            - Fedora: `sudo rpm -i bluepad-*.rpm`
            - AppImage: `chmod +x bluepad_*.AppImage && ./bluepad_*.AppImage`
          files: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm
            src-tauri/target/release/bundle/appimage/*.AppImage
          draft: true
          prerelease: false
