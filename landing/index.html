  <title>BluePad — Markdown Editor</title>
  <meta name="description" content="BluePad is a fast, distraction-free markdown editor for Windows.">
  <!-- 언어 감지 후 /ko·/en·/ja 로 리다이렉트하는 스플래시 페이지. 색인 대상이 아니므로 noindex만 두고
       canonical/hreflang은 두지 않는다(noindex와 신호 충돌 방지). hreflang 클러스터는 각 로컬라이즈 페이지가 보유. -->

  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <meta name="naver-site-verification" content="9b479417f022befdffd0b837c015469b604758d3" />

  <script>
    (function() {
      var lang = (navigator.language || navigator.userLanguage || 'ko').toLowerCase();
      if (lang.startsWith('ja')) {
        window.location.replace('/ja/');
      } else if (lang.startsWith('en')) {
        window.location.replace('/en/');
      } else {
        window.location.replace('/ko/');
      }
    })();
  </script>
