<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BluePad 관리자</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--surface:#18181b;--border:#27272a;--text:#fafafa;--muted:#a1a1aa;--accent:#3b82f6;--danger:#ef4444;--success:#22c55e}
body{font-family:'Pretendard Variable',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem}
h1{font-size:1.5rem;font-weight:700;margin-bottom:1.5rem}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;width:100%;max-width:360px}
.login-box h2{margin-bottom:1rem;font-size:1.25rem}
.login-box input{width:100%;padding:.75rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:1rem;margin-bottom:1rem}
.login-box input:focus{outline:none;border-color:var(--accent)}
.btn{padding:.6rem 1.2rem;border:none;border-radius:8px;font-size:.875rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-danger{background:var(--danger);color:#fff;padding:.4rem .8rem;font-size:.75rem}
.btn-block{width:100%;padding:.75rem}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
.card-label{font-size:.75rem;color:var(--muted);margin-bottom:.5rem}
.card-value{font-size:2rem;font-weight:700}
.table-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:.875rem}
th,td{padding:.75rem 1rem;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600;font-size:.75rem}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:.2rem .6rem;border-radius:9999px;font-size:.7rem;font-weight:600}
.badge-active{background:rgba(34,197,94,.15);color:var(--success)}
.badge-inactive{background:rgba(239,68,68,.15);color:var(--danger)}
.hidden{display:none}
.error{color:var(--danger);font-size:.875rem;margin-top:.5rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.header h1{margin-bottom:0}
@media(max-width:640px){
  body{padding:1rem}
  .card-value{font-size:1.5rem}
  th,td{padding:.5rem .6rem;font-size:.75rem}
}
</style>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
</head>
<body>

<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <h2>BluePad 관리자</h2>
    <input type="password" id="password-input" placeholder="관리자 비밀번호" autocomplete="off">
    <button class="btn btn-primary btn-block" onclick="doLogin()">로그인</button>
    <p id="login-error" class="error hidden"></p>
  </div>
</div>

<div id="dashboard" class="hidden">
  <div class="header">
    <h1>BluePad 관리자 대시보드</h1>
    <button class="btn btn-danger" onclick="doLogout()">로그아웃</button>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-label">총 다운로드</div>
      <div class="card-value" id="stat-downloads">--</div>
    </div>
    <div class="card">
      <div class="card-label">총 라이선스</div>
      <div class="card-value" id="stat-licenses">--</div>
    </div>
    <div class="card">
      <div class="card-label">활성 라이선스</div>
      <div class="card-value" id="stat-active">--</div>
    </div>
    <div class="card">
      <div class="card-label">체험 사용자</div>
      <div class="card-value" id="stat-trials">--</div>
    </div>
    <div class="card">
      <div class="card-label">문의 티켓</div>
      <div class="card-value" id="stat-tickets">--</div>
    </div>
  </div>

  <h2 style="font-size:1.1rem;margin-bottom:1rem">라이선스</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>라이선스 키</th>
          <th>이메일</th>
          <th>기기</th>
          <th>생성일</th>
          <th>상태</th>
          <th>작업</th>
        </tr>
      </thead>
      <tbody id="license-table"></tbody>
    </table>
  </div>

  <h2 style="font-size:1.1rem;margin:1.5rem 0 1rem">체험 사용자</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>기기명</th>
          <th>기기 ID</th>
          <th>시작일</th>
          <th>남은 일수</th>
          <th>상태</th>
          <th>작업</th>
        </tr>
      </thead>
      <tbody id="trial-table"></tbody>
    </table>
  </div>

  <h2 style="font-size:1.1rem;margin:1.5rem 0 1rem">결제 내역</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>PayPal 주문 ID</th>
          <th>이메일</th>
          <th>금액</th>
          <th>라이선스 키</th>
          <th>상태</th>
          <th>날짜</th>
          <th>환불</th>
        </tr>
      </thead>
      <tbody id="payment-table"></tbody>
    </table>
  </div>

  <h2 style="font-size:1.1rem;margin:1.5rem 0 1rem">문의 티켓</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>유형</th>
          <th>이메일</th>
          <th>라이선스 키</th>
          <th>내용</th>
          <th>날짜</th>
          <th>상태</th>
        </tr>
      </thead>
      <tbody id="ticket-table"></tbody>
    </table>
  </div>
</div>

<script>
const LICENSE_API = 'https://bluepad-license-api.blueehdwp.workers.dev';
const DOWNLOAD_API = 'https://bluepad-download.blueehdwp.workers.dev';

function getToken() { return sessionStorage.getItem('bp_admin_token'); }

function doLogin() {
  const pw = document.getElementById('password-input').value.trim();
  if (!pw) return;
  sessionStorage.setItem('bp_admin_token', pw);
  checkAuth();
}

function doLogout() {
  sessionStorage.removeItem('bp_admin_token');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

async function checkAuth() {
  const token = getToken();
  if (!token) return;
  try {
    const res = await fetch(LICENSE_API + '/api/admin/licenses', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.status === 401) {
      document.getElementById('login-error').textContent = '비밀번호가 올바르지 않습니다';
      document.getElementById('login-error').classList.remove('hidden');
      sessionStorage.removeItem('bp_admin_token');
      return;
    }
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadDashboard();
  } catch (e) {
    document.getElementById('login-error').textContent = '연결 오류';
    document.getElementById('login-error').classList.remove('hidden');
  }
}

async function loadDashboard() {
  loadStats();
  loadLicenses();
  loadTrials();
  loadTickets();
  loadPayments();
}

async function loadStats() {
  try {
    const res = await fetch(DOWNLOAD_API + '/api/stats');
    const data = await res.json();
    document.getElementById('stat-downloads').textContent = (data.total_downloads || data.count || 0).toLocaleString();
  } catch (e) {
    document.getElementById('stat-downloads').textContent = '오류';
  }
}

async function loadLicenses() {
  const token = getToken();
  try {
    const res = await fetch(LICENSE_API + '/api/admin/licenses', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    const licenses = data.licenses || [];
    document.getElementById('stat-licenses').textContent = licenses.length;
    document.getElementById('stat-active').textContent = licenses.filter(l => l.active === 1).length;
    const tbody = document.getElementById('license-table');
    tbody.innerHTML = licenses.map(l => `
      <tr>
        <td style="font-family:monospace;font-size:.8rem">${esc(l.license_key)}</td>
        <td>${esc(l.email || '-')}</td>
        <td>${l.device_count || 0} / ${l.max_devices}</td>
        <td>${formatDate(l.created_at)}</td>
        <td><span class="badge ${l.active ? 'badge-active' : 'badge-inactive'}">${l.active ? '활성' : '비활성'}</span></td>
        <td>${l.active ? `<button class="btn btn-danger" onclick="deactivate('${esc(l.license_key)}')">비활성화</button>` : ''}</td>
      </tr>
    `).join('');
  } catch (e) {
    document.getElementById('license-table').innerHTML = '<tr><td colspan="6">불러오기 실패</td></tr>';
  }
}

async function deactivate(key) {
  if (!confirm('라이선스 ' + key + '을(를) 비활성화하시겠습니까?\n모든 기기 활성화가 해제됩니다.')) return;
  const token = getToken();
  try {
    const res = await fetch(LICENSE_API + '/api/admin/deactivate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ license_key: key })
    });
    const data = await res.json();
    if (data.success) {
      loadLicenses();
    } else {
      alert('실패: ' + (data.error || '알 수 없는 오류'));
    }
  } catch (e) {
    alert('연결 오류');
  }
}

async function loadTrials() {
  const token = getToken();
  try {
    const res = await fetch(LICENSE_API + '/api/admin/trials', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    const trials = data.trials || [];
    document.getElementById('stat-trials').textContent = trials.length;
    const tbody = document.getElementById('trial-table');
    tbody.innerHTML = trials.map(t => {
      const startMs = new Date(t.trial_start + 'Z').getTime();
      const elapsed = Date.now() - startMs;
      const daysLeft = Math.max(0, Math.ceil((14*24*60*60*1000 - elapsed) / (24*60*60*1000)));
      const expired = daysLeft <= 0;
      return `<tr>
        <td>${esc(t.device_name || '알 수 없음')}</td>
        <td style="font-family:monospace;font-size:.8rem">${esc(t.device_id)}</td>
        <td>${formatDate(t.trial_start)}</td>
        <td>${expired ? '0' : daysLeft}일</td>
        <td><span class="badge ${expired ? 'badge-inactive' : 'badge-active'}">${expired ? '만료' : '사용 중'}</span></td>
        <td><button class="btn btn-danger" onclick="adjustTrial('${esc(t.device_id)}',${daysLeft})">일수 조정</button></td>
      </tr>`;
    }).join('');
  } catch (e) {
    document.getElementById('trial-table').innerHTML = '<tr><td colspan="5">불러오기 실패</td></tr>';
  }
}

async function adjustTrial(deviceId, currentDays) {
  const input = prompt('남은 일수를 입력하세요 (현재: ' + currentDays + '일, 0=즉시만료, 14=전체리셋):', String(currentDays));
  if (input === null) return;
  const days = parseInt(input, 10);
  if (isNaN(days) || days < 0 || days > 365) { alert('0~365 사이 숫자를 입력해주세요.'); return; }
  const token = getToken();
  try {
    const res = await fetch(LICENSE_API + '/api/admin/trial/adjust', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ device_id: deviceId, days_left: days })
    });
    const data = await res.json();
    if (data.success) { alert('변경 완료: ' + days + '일'); loadTrials(); }
    else alert('실패: ' + (data.error || '알 수 없는 오류'));
  } catch (e) { alert('연결 오류'); }
}

async function loadTickets() {
  const token = getToken();
  try {
    const res = await fetch(LICENSE_API + '/api/admin/tickets', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    const tickets = data.tickets || [];
    document.getElementById('stat-tickets').textContent = tickets.length;
    const typeMap = { refund: '환불', bug: '버그', feature: '기능 요청', other: '기타' };
    const tbody = document.getElementById('ticket-table');
    tbody.innerHTML = tickets.map(t => `<tr>
      <td><span class="badge ${t.type === 'refund' ? 'badge-inactive' : 'badge-active'}">${typeMap[t.type] || t.type}</span></td>
      <td>${esc(t.email)}</td>
      <td style="font-family:monospace;font-size:.8rem">${esc(t.license_key || '-')}</td>
      <td class="ticket-msg" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer" data-msg="${esc(t.message)}">${esc(t.message)}</td>
      <td>${formatDate(t.created_at)}</td>
      <td><span class="badge ${t.status === 'open' ? 'badge-active' : 'badge-inactive'}">${t.status === 'open' ? '접수' : '처리 완료'}</span></td>
    </tr>`).join('');
  } catch (e) {
    document.getElementById('ticket-table').innerHTML = '<tr><td colspan="6">불러오기 실패</td></tr>';
  }
}

async function loadPayments() {
  const token = getToken();
  try {
    const res = await fetch(LICENSE_API + '/api/admin/payments', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    const payments = data.payments || [];
    const tbody = document.getElementById('payment-table');
    tbody.innerHTML = payments.map(p => {
      const statusMap = { completed: '완료', captured: '캡처', refunded: '환불됨', license_failed: '키발급실패', amount_mismatch: '금액불일치' };
      const statusClass = p.refunded ? 'badge-inactive' : (p.status === 'completed' ? 'badge-active' : 'badge-inactive');
      return `<tr>
        <td style="font-family:monospace;font-size:.75rem">${esc(p.paypal_order_id)}</td>
        <td>${esc(p.email || '-')}</td>
        <td>$${esc(p.amount || '0')} ${esc(p.currency || '')}</td>
        <td style="font-family:monospace;font-size:.75rem">${esc(p.license_key || '-')}</td>
        <td><span class="badge ${statusClass}">${statusMap[p.status] || p.status}</span></td>
        <td>${formatDate(p.created_at)}</td>
        <td>${!p.refunded && p.license_key ? `<button class="btn btn-danger" onclick="doRefund('${esc(p.paypal_order_id)}','${esc(p.email)}','${esc(p.license_key)}')">환불</button>` : (p.refunded ? '<span style="color:var(--muted);font-size:.75rem">환불완료</span>' : '-')}</td>
      </tr>`;
    }).join('');
    if (!payments.length) tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--muted)">결제 내역 없음</td></tr>';
  } catch (e) {
    document.getElementById('payment-table').innerHTML = '<tr><td colspan="7">불러오기 실패</td></tr>';
  }
}

async function doRefund(orderId, email, licenseKey) {
  if (!confirm(`환불 처리하시겠습니까?\n\n주문: ${orderId}\n이메일: ${email}\n라이선스: ${licenseKey}\n\n⚠️ 라이선스가 비활성화됩니다.\n⚠️ PayPal에서 수동 환불도 진행해야 합니다.`)) return;
  const token = getToken();
  try {
    const res = await fetch(LICENSE_API + '/api/admin/refund', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ paypal_order_id: orderId })
    });
    const data = await res.json();
    if (data.success) {
      alert(`환불 처리 완료!\n\n비활성화된 라이선스: ${data.refunded_license}\n\n⚠️ PayPal 대시보드에서 $${data.amount} 수동 환불을 진행해주세요.`);
      loadPayments();
      loadLicenses();
    } else {
      alert('실패: ' + (data.error || '알 수 없는 오류'));
    }
  } catch (e) {
    alert('연결 오류');
  }
}

function formatDate(d) {
  if (!d) return '-';
  const date = new Date(d.endsWith('Z') ? d : d + 'Z');
  return date.toLocaleDateString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', timeZone:'Asia/Seoul' });
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Event delegation for ticket messages (avoids inline onclick with unsanitized data)
document.addEventListener('click', function(e) {
  const el = e.target.closest('.ticket-msg');
  if (el) alert(el.getAttribute('data-msg'));
});

// Brute force protection
let loginAttempts = 0;
let lockoutUntil = 0;
const MAX_ATTEMPTS = 5;
const LOCKOUT_MS = 30000;

(function patchLogin() {
  const origDoLogin = doLogin;
  window.doLogin = function() {
    if (Date.now() < lockoutUntil) {
      const secs = Math.ceil((lockoutUntil - Date.now()) / 1000);
      document.getElementById('login-error').textContent = secs + '초 후 다시 시도해주세요';
      document.getElementById('login-error').classList.remove('hidden');
      return;
    }
    origDoLogin();
  };

  const origCheckAuth = checkAuth;
  window.checkAuth = async function() {
    const token = getToken();
    if (!token) return;
    try {
      const res = await fetch(LICENSE_API + '/api/admin/licenses', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (res.status === 401) {
        loginAttempts++;
        if (loginAttempts >= MAX_ATTEMPTS) {
          lockoutUntil = Date.now() + LOCKOUT_MS;
          loginAttempts = 0;
          document.getElementById('login-error').textContent = '로그인 시도 횟수 초과. 30초 후 다시 시도해주세요';
        } else {
          document.getElementById('login-error').textContent = '비밀번호가 올바르지 않습니다 (' + loginAttempts + '/' + MAX_ATTEMPTS + ')';
        }
        document.getElementById('login-error').classList.remove('hidden');
        sessionStorage.removeItem('bp_admin_token');
        return;
      }
      loginAttempts = 0;
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('hidden');
      loadDashboard();
    } catch (e) {
      document.getElementById('login-error').textContent = '연결 오류';
      document.getElementById('login-error').classList.remove('hidden');
    }
  };
})();

// 저장된 토큰으로 자동 로그인
checkAuth();
</script>
</body>
</html>
