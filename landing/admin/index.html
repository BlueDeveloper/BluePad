<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BluePad Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#09090b;--surface:#18181b;--border:#27272a;--text:#fafafa;--muted:#a1a1aa;--accent:#3b82f6;--danger:#ef4444;--success:#22c55e}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:1.5rem}
h1{font-size:1.5rem;font-weight:700;margin-bottom:1.5rem}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:80vh}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:2rem;width:100%;max-width:360px}
.login-box h2{margin-bottom:1rem;font-size:1.25rem}
.login-box input{width:100%;padding:.75rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:1rem;margin-bottom:1rem}
.login-box input:focus{outline:none;border-color:var(--accent)}
.btn{padding:.6rem 1.2rem;border:none;border-radius:8px;font-size:.875rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#fff}
.btn-danger{background:var(--danger);color:#fff;padding:.4rem .8rem;font-size:.75rem}
.btn-block{width:100%;padding:.75rem}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.25rem}
.card-label{font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}
.card-value{font-size:2rem;font-weight:700}
.table-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--border);border-radius:12px}
table{width:100%;border-collapse:collapse;font-size:.875rem}
th,td{padding:.75rem 1rem;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:600;font-size:.75rem;text-transform:uppercase;letter-spacing:.05em}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:.2rem .6rem;border-radius:9999px;font-size:.7rem;font-weight:600}
.badge-active{background:rgba(34,197,94,.15);color:var(--success)}
.badge-inactive{background:rgba(239,68,68,.15);color:var(--danger)}
.hidden{display:none}
.error{color:var(--danger);font-size:.875rem;margin-top:.5rem}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
.header h1{margin-bottom:0}
@media(max-width:640px){
  body{padding:1rem}
  .card-value{font-size:1.5rem}
  th,td{padding:.5rem .6rem;font-size:.75rem}
}
</style>
</head>
<body>

<div id="login-screen" class="login-wrap">
  <div class="login-box">
    <h2>BluePad Admin</h2>
    <input type="password" id="password-input" placeholder="Admin Secret" autocomplete="off">
    <button class="btn btn-primary btn-block" onclick="doLogin()">Login</button>
    <p id="login-error" class="error hidden"></p>
  </div>
</div>

<div id="dashboard" class="hidden">
  <div class="header">
    <h1>BluePad Admin Dashboard</h1>
    <button class="btn btn-danger" onclick="doLogout()">Logout</button>
  </div>

  <div class="cards">
    <div class="card">
      <div class="card-label">Total Downloads</div>
      <div class="card-value" id="stat-downloads">--</div>
    </div>
    <div class="card">
      <div class="card-label">Total Licenses</div>
      <div class="card-value" id="stat-licenses">--</div>
    </div>
    <div class="card">
      <div class="card-label">Active Licenses</div>
      <div class="card-value" id="stat-active">--</div>
    </div>
    <div class="card">
      <div class="card-label">Trial Users</div>
      <div class="card-value" id="stat-trials">--</div>
    </div>
  </div>

  <h2 style="font-size:1.1rem;margin-bottom:1rem">Licenses</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>License Key</th>
          <th>Email</th>
          <th>Devices</th>
          <th>Created</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="license-table"></tbody>
    </table>
  </div>

  <h2 style="font-size:1.1rem;margin:1.5rem 0 1rem">Trials</h2>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Device Name</th>
          <th>Device ID</th>
          <th>Trial Start</th>
          <th>Days Left</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="trial-table"></tbody>
    </table>
  </div>
</div>

<script>
const LICENSE_API = 'https://bluepad-license-api.blueehdwp.workers.dev';
const DOWNLOAD_API = 'https://bluepad-download.blueehdwp.workers.dev';

function getToken() { return sessionStorage.getItem('bp_admin_token'); }

function doLogin() {
  const pw = document.getElementById('password-input').value.trim();
  if (!pw) return;
  sessionStorage.setItem('bp_admin_token', pw);
  checkAuth();
}

function doLogout() {
  sessionStorage.removeItem('bp_admin_token');
  document.getElementById('dashboard').classList.add('hidden');
  document.getElementById('login-screen').classList.remove('hidden');
}

async function checkAuth() {
  const token = getToken();
  if (!token) return;
  try {
    const res = await fetch(LICENSE_API + '/api/admin/licenses', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.status === 401) {
      document.getElementById('login-error').textContent = 'Invalid credentials';
      document.getElementById('login-error').classList.remove('hidden');
      sessionStorage.removeItem('bp_admin_token');
      return;
    }
    document.getElementById('login-screen').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    loadDashboard();
  } catch (e) {
    document.getElementById('login-error').textContent = 'Connection error';
    document.getElementById('login-error').classList.remove('hidden');
  }
}

async function loadDashboard() {
  loadStats();
  loadLicenses();
  loadTrials();
}

async function loadStats() {
  try {
    const res = await fetch(DOWNLOAD_API + '/api/stats');
    const data = await res.json();
    document.getElementById('stat-downloads').textContent = (data.total_downloads || data.count || 0).toLocaleString();
  } catch (e) {
    document.getElementById('stat-downloads').textContent = 'Error';
  }
}

async function loadLicenses() {
  const token = getToken();
  try {
    const res = await fetch(LICENSE_API + '/api/admin/licenses', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    const licenses = data.licenses || [];
    document.getElementById('stat-licenses').textContent = licenses.length;
    document.getElementById('stat-active').textContent = licenses.filter(l => l.active === 1).length;
    const tbody = document.getElementById('license-table');
    tbody.innerHTML = licenses.map(l => `
      <tr>
        <td style="font-family:monospace;font-size:.8rem">${esc(l.license_key)}</td>
        <td>${esc(l.email || '-')}</td>
        <td>${l.device_count || 0} / ${l.max_devices}</td>
        <td>${formatDate(l.created_at)}</td>
        <td><span class="badge ${l.active ? 'badge-active' : 'badge-inactive'}">${l.active ? 'Active' : 'Inactive'}</span></td>
        <td>${l.active ? `<button class="btn btn-danger" onclick="deactivate('${esc(l.license_key)}')">Deactivate</button>` : ''}</td>
      </tr>
    `).join('');
  } catch (e) {
    document.getElementById('license-table').innerHTML = '<tr><td colspan="6">Failed to load</td></tr>';
  }
}

async function deactivate(key) {
  if (!confirm('Deactivate license ' + key + '? This will remove all device activations.')) return;
  const token = getToken();
  try {
    const res = await fetch(LICENSE_API + '/api/admin/deactivate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
      body: JSON.stringify({ license_key: key })
    });
    const data = await res.json();
    if (data.success) {
      loadLicenses();
    } else {
      alert('Failed: ' + (data.error || 'unknown'));
    }
  } catch (e) {
    alert('Connection error');
  }
}

async function loadTrials() {
  const token = getToken();
  try {
    const res = await fetch(LICENSE_API + '/api/admin/trials', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    const trials = data.trials || [];
    document.getElementById('stat-trials').textContent = trials.length;
    const tbody = document.getElementById('trial-table');
    tbody.innerHTML = trials.map(t => {
      const startMs = new Date(t.trial_start + 'Z').getTime();
      const elapsed = Date.now() - startMs;
      const daysLeft = Math.max(0, Math.ceil((14*24*60*60*1000 - elapsed) / (24*60*60*1000)));
      const expired = daysLeft <= 0;
      return `<tr>
        <td>${esc(t.device_name || 'Unknown')}</td>
        <td style="font-family:monospace;font-size:.8rem">${esc(t.device_id)}</td>
        <td>${formatDate(t.trial_start)}</td>
        <td>${expired ? '0' : daysLeft}</td>
        <td><span class="badge ${expired ? 'badge-inactive' : 'badge-active'}">${expired ? 'Expired' : 'Active'}</span></td>
      </tr>`;
    }).join('');
  } catch (e) {
    document.getElementById('trial-table').innerHTML = '<tr><td colspan="5">Failed to load</td></tr>';
  }
}

function formatDate(d) {
  if (!d) return '-';
  return new Date(d).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
}

function esc(s) {
  if (!s) return '';
  const el = document.createElement('span');
  el.textContent = s;
  return el.innerHTML;
}

// Auto-login if token exists
checkAuth();
</script>
</body>
</html>
